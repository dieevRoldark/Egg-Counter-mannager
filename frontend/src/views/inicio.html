<header class="main__header">
    <h1 class="title">Producción Diaria</h1>
    <p>Registra los huevos por galpón y revisa el acumulado del día.</p>
</header>
<section class="galpones__container">
    <article class="galpon">
        <h2 class="galpon__title" tabindex="0" role="button" aria-expanded="true">
            <span class="galpon__icon" aria-hidden="true">▼</span>
            Primeras
        </h2>
        <div class="galpon__body">
            <form class="form__egg" data-galpon="primeras">
                <div>
                    <label for="cantidad-primeras">Cantidad de huevos:</label>
                    <input type="number" id="cantidad-primeras" name="cantidad-primeras" min="0">
                    <select name="tamano-primeras" id="tamano-primeras">
                        <option value="B">B</option>
                    </select>
                </div>
                <div>
                    <label for="cantidad-primeras">Cantidad de huevos:</label>
                    <input type="number" name="cantidad-primeras" min="0" required>
                    <select name="tamano-primeras" >
                        <option value="A">A</option>
                    </select>
                </div>
                <div>
                    <label for="cantidad-primeras">Cantidad de huevos:</label>
                    <input type="number" name="cantidad-primeras" min="0" required>
                    <select name="tamano-primeras">
                        <option value="AA">AA</option>
                    </select>
                </div>
                <div>
                    <label for="cantidad-primeras">Cantidad de huevos:</label>
                    <input type="number" name="cantidad-primeras" min="0">
                    <select name="tamano-primeras">
                        <option value="AAA">AAA</option>
                    </select>
                </div>
                <button type="submit">Guardar</button>
            </form>
            <p class="galpon__avg" data-average="primeras">Total primeras: 0.00</p>
        </div>
    </article>
